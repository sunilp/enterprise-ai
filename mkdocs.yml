site_name: Enterprise AI
site_url: https://sunilprakash.com/enterprise-ai/
site_description: The enterprise AI transformation playbook for CIOs, CAIOs, and technology leaders. Operating models, governance architecture, agentic strategy, workforce evolution, and measurement frameworks for moving AI from pilots to P&L impact.
site_author: Sunil Prakash
repo_url: https://github.com/sunilp/enterprise-ai-transformation
repo_name: sunilp/enterprise-ai-transformation
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font: false
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.follow
  logo: img/logo-light.svg
  favicon: img/logo.svg
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true

validation:
  nav:
    not_in_nav: warn

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - meta

nav:
  - Home: index.md
  - Position:
    - The Problem: position/the-problem.md
    - Seven Failure Modes: position/failure-modes.md
    - What Transformation Means: position/what-transformation-means.md
  - Operating Model:
    - The CAIO Mandate: operating-model/caio-mandate.md
    - Structural Models: operating-model/structural-models.md
    - Decision Rights: operating-model/decision-rights.md
    - Cross-Functional Coordination: operating-model/coordination.md
  - Assessment:
    - AI Readiness: assessment/ai-readiness.md
    - Data Readiness: assessment/data-readiness.md
    - Process and Talent Readiness: assessment/process-talent.md
    - Maturity Model: assessment/maturity-model.md
  - Portfolio:
    - Use Case Prioritization: portfolio/prioritization.md
    - Value Concentration: portfolio/value-concentration.md
    - Pilot to Production: portfolio/pilot-to-production.md
  - Governance:
    - Governance Architecture: governance/architecture.md
    - GenAI Model Risk: governance/genai-model-risk.md
    - Agent Governance: governance/agent-governance.md
    - Shadow AI: governance/shadow-ai.md
    - Regulatory Readiness: governance/regulatory-readiness.md
  - Agentic Strategy:
    - The Agentic Shift: agentic-strategy/the-shift.md
    - Protocol Landscape: agentic-strategy/protocol-landscape.md
    - Human-Agent Collaboration: agentic-strategy/human-agent-collaboration.md
    - FinOps for Agents: agentic-strategy/finops.md
  - Workforce:
    - Role Evolution: workforce/role-evolution.md
    - The Middle Management Gap: workforce/middle-management.md
    - Knowledge Architecture: workforce/knowledge-architecture.md
  - Measurement:
    - Measurement Design: measurement/design.md
    - Financial Linkage: measurement/financial-linkage.md
    - Board Reporting: measurement/board-reporting.md
  - Transformation:
    - 12-Month Roadmap: transformation/roadmap.md
    - Phase Gates: transformation/phase-gates.md
  - Proof:
    - Case Studies: proof/case-studies.md
    - Decision Records: proof/decision-records.md
    - Assessment Checklists: proof/checklists.md
  - Sources & Methodology: sources.md
  - Glossary: glossary.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sunilp
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/sunilp
  analytics:
    provider: google
    property: G-4KDCBS18GZ
  generator: false

extra_css:
  - css/custom.css

copyright: >
  Copyright &copy; 2026 Sunil Prakash &middot;
  <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>
